<!DOCTYPE html>
<html>
<head>
    <title>Automação Financeiro</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 50px;
        }

        h1 {
            color: #333;
            margin-bottom: 40px;
        }

        .opcoes {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 300px;
        }

        a.button {
            display: block;
            text-decoration: none;
            background-color: #4CAF50;
            color: white;
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            font-size: 18px;
            transition: 0.3s;
        }

        a.button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <h1>Bem-vindo ao sistema de automação!</h1>

    <div class="opcoes">
        <a href="/upload" class="button">Folhas de Pagamentos</a>
        <a href="/converter_comprovantes" class="button">Comprovantes Bancos</a>
        <a href="/excel" class="button">Excel → DAT</a>
    </div>

</body>
</html>
