<!DOCTYPE html>
<html>
<head>
    <title>Excel → DAT</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
            width: 350px;
        }

        input[type="file"] {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 12px;
            font-size: 16px;
            background-color: #9C27B0;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #7B1FA2;
        }

        .resultado {
            margin-top: 20px;
            padding: 15px;
            background-color: #f3e5f5;
            border: 1px solid #e1bee7;
            border-radius: 5px;
            color: #6a1b9a;
        }
    </style>
</head>
<body>

<h1>Converter Excel em .DAT</h1>

<form method="POST" enctype="multipart/form-data">
    <label>Selecione os arquivos Excel (.xlsx):</label>
    <input type="file" name="arquivos" multiple required>

    <button type="submit">Converter</button>
</form>

</body>
</html>
