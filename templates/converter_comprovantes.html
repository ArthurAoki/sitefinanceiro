<!DOCTYPE html>
<html>
<head>
    <title>Converter Comprovantes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
            width: 350px;
        }

        select, input[type="file"] {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 12px;
            font-size: 16px;
            background-color: #FF9800;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #FB8C00;
        }

        .resultado {
            margin-top: 20px;
            padding: 15px;
            background-color: #fff3e0;
            border: 1px solid #ffe0b2;
            border-radius: 5px;
            color: #ef6c00;
        }
    </style>
</head>
<body>

<h1>Converter Comprovantes</h1>

<form method="POST" enctype="multipart/form-data">
    <label>Escolha o banco:</label>
    <select name="banco" required>
        <option value="bb">Banco do Brasil</option>
        <option value="bradesco">Bradesco</option>
        <option value="inter">Banco Inter</option>
    </select>

    <label>Selecione os PDFs:</label>
    <input type="file" name="arquivos" multiple required>

    <button type="submit">Processar</button>
</form>

</body>
</html>
